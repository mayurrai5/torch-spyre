name: Build a pod  and push to icr
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install OpenShift CLI
        if: steps.cache-oc.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/preflight.sh
          ./scripts/preflight.sh
      - name: Apply BuildConfig
        run: |
          oc --server=$OC_SERVER \
          --token=$OC_TOKEN \
          --insecure-skip-tls-verify=true \
          -n $OC_NAMESPACE \
          apply -f torch-spyre/buildconfig.yaml
      - name: Trigger BuildConfig
        run: |
          oc --server=$OC_SERVER \
             --token=$OC_TOKEN \
             --insecure-skip-tls-verify=true \
             -n $OC_NAMESPACE \
             start-build torch-spyre-build --wait --follow